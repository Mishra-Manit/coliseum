# Coliseum Configuration

llm:
  provider: "xai"

trading:
  paper_mode: false
  contracts: 5

scout:
  market_fetch_limit: 20000
  min_close_hours: 0
  max_close_hours: 48
  min_price: 94
  max_price: 96
  max_spread_cents: 3
  min_volume: 1000

guardian:
  floor_price: 0.50 # Always-on circuit breaker: sell any open position below this price
  window_threshold_price: 0.85 # Aggressive stop: sell if below this AND within window_minutes of close
  window_minutes: 30 # Minutes before close_time at which window_threshold_price activates
  sell_aggression_cents: 2 # Place sell limit at current_price - this many cents to cross the spread

execution:
  max_slippage_pct: 0.05 # Reject trade if slippage > 5%
  order_check_interval_seconds: 120 # Check order status every 2 min
  max_reprice_attempts: 3 # Give up after 3 reprice attempts
  reprice_aggression: 0.02 # Increase limit by 2 cents each reprice
  min_fill_pct_to_keep: 0.25 # Keep partial fill if > 25% filled
  max_order_age_minutes: 60 # Cancel order if open > 1 hour

daemon:
  heartbeat_interval_minutes: 120 # Full pipeline cycle interval
  guardian_interval_minutes: 2 # Guardian-only checks between full cycles
  max_consecutive_failures: 5 # Failures before pausing

market_context:
  refresh_every_n_cycles: 12

telegram_send_alerts: true

dashboard_display:
  start_date: "2026-03-20"
  cache_ttl_seconds: 300 # Dashboard API response cache (seconds)
